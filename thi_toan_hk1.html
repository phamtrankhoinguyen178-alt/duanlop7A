<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quiz Toán HK1</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#43cea2,#185a9d);
}

.container{
background:white;
width:420px;
margin:100px auto;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
text-align:center;
animation:fadeIn 1s;
}

.title{
font-size:24px;
font-weight:bold;
margin-bottom:20px;
}

.btn{
display:block;
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.start{background:#4caf50;color:white;}
.submit{background:#ff9800;color:white;}
.cancel{background:#f44336;color:white;}
.home{background:#2196f3;color:white;}

.btn:hover{
transform:scale(1.05);
opacity:0.9;
}

.question{text-align:left;margin-bottom:15px}
.correct{color:green}
.wrong{color:red}

#timer{
font-size:20px;
color:#009688;
margin-bottom:15px;
font-weight:bold;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="container">
    <div class="title">📐 QUIZ TOÁN LỚP 7 - HK1</div>
    <button class="btn start" onclick="startQuiz()">🚀 Bắt đầu</button>
    <button class="btn home" onclick="goHome()">⬅ Trang chủ</button>
</div>

<!-- QUIZ -->
<div id="quizPage" class="container" style="display:none;">
    <div class="title">📝 Bài kiểm tra</div>
    <div id="timer">⏱ 30:00</div>
    <div id="quiz"></div>
    <button class="btn submit" onclick="submitQuiz()">Nộp bài</button>
    <button class="btn cancel" onclick="cancelQuiz()">Hủy bài</button>
</div>

<!-- RESULT -->
<div id="resultPage" class="container" style="display:none;">
    <div class="title">🎯 Kết quả</div>
    <div id="score"></div>
    <div id="answers"></div>
    <button class="btn home" onclick="goHome()">Trang chủ</button>
</div>

<script>

// ===== BANK TOÁN HK1
const bank = [
{q:"2 + 3 = ?",a:["4","5","6","7"],correct:1},
{q:"5 × 6 = ?",a:["30","25","20","35"],correct:0},
{q:"10 - 7 = ?",a:["2","3","4","5"],correct:1},
{q:"12 ÷ 3 = ?",a:["3","4","5","6"],correct:1},

{q:"Số đối của 5 là?",a:["-5","5","0","1"],correct:0},
{q:"| -7 | = ?",a:["-7","7","0","1"],correct:1},

{q:"3² = ?",a:["6","9","12","3"],correct:1},
{q:"√16 = ?",a:["2","3","4","5"],correct:2},

{q:"Phân số 1/2 = ?",a:["0.5","0.2","2","1"],correct:0},
{q:"1/4 + 1/4 = ?",a:["1/2","1/4","2/4","1"],correct:0},

{q:"5x = 20 → x = ?",a:["2","3","4","5"],correct:2},
{q:"x + 3 = 7 → x = ?",a:["3","4","5","6"],correct:1},

{q:"Chu vi hình vuông cạnh 4 là?",a:["8","12","16","20"],correct:2},
{q:"Diện tích hình vuông cạnh 4 là?",a:["8","12","16","20"],correct:2},

{q:"Tam giác có tổng 3 góc bằng?",a:["90°","180°","360°","270°"],correct:1},
{q:"Góc vuông là?",a:["45°","60°","90°","120°"],correct:2},

{q:"7 × 8 = ?",a:["54","56","58","60"],correct:1},
{q:"9 + 6 = ?",a:["14","15","16","17"],correct:1},

{q:"15 - 5 = ?",a:["5","10","15","20"],correct:1},
{q:"20 ÷ 5 = ?",a:["2","3","4","5"],correct:2}
];

// ===== VAR
let questions=[], timeLeft=1800, interval;

// ===== START
function startQuiz(){
document.getElementById("home").style.display="none";
document.getElementById("quizPage").style.display="block";

questions=[...bank].sort(()=>0.5-Math.random()).slice(0,20);
loadQuiz();

timeLeft=1800;
interval=setInterval(()=>{
timeLeft--;

let m=Math.floor(timeLeft/60);
let s=timeLeft%60;

document.getElementById("timer").innerText=
`⏱ ${m}:${s.toString().padStart(2,'0')}`;

if(timeLeft<=60){
document.getElementById("timer").style.color="red";
}

if(timeLeft<=0){
clearInterval(interval);
alert("⏰ Hết thời gian!");
submitQuiz();
}

},1000);
}

// ===== LOAD
function loadQuiz(){
let html="";
questions.forEach((q,i)=>{
html+=`<div class="question"><p>${i+1}. ${q.q}</p>`;
q.a.forEach((c,j)=>{
html+=`<label><input type="radio" name="q${i}" value="${j}"> ${c}</label><br>`;
});
html+="</div>";
});
document.getElementById("quiz").innerHTML=html;
}

// ===== SUBMIT
function submitQuiz(){
clearInterval(interval);
let score=0,html="";

questions.forEach((q,i)=>{
let ans=document.querySelector(`input[name="q${i}"]:checked`);
let user=ans?parseInt(ans.value):-1;

if(user===q.correct){
score++;
html+=`<p class="correct">Câu ${i+1}: Đúng</p>`;
}else{
html+=`<p class="wrong">Câu ${i+1}: Sai (Đáp án: ${q.a[q.correct]})</p>`;
}
});

document.getElementById("quizPage").style.display="none";
document.getElementById("resultPage").style.display="block";

document.getElementById("score").innerText=`Điểm: ${score}/20`;
document.getElementById("answers").innerHTML=html;
}

// ===== CANCEL
function cancelQuiz(){
clearInterval(interval);
window.location.href="trangchu.html";
}

// ===== HOME
function goHome(){
window.location.href="trangchu.html";
}

</script>

</body>
</html>
