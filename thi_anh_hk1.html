<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quiz Tiếng Anh HK1</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
}


.container{
background:white;
width:420px;
margin:100px auto;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
text-align:center;
animation:fadeIn 1s;
}


.title{
font-size:24px;
font-weight:bold;
margin-bottom:20px;
}


.btn{
display:block;
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.start{background:#4caf50;color:white;}
.submit{background:#ff9800;color:white;}
.cancel{background:#f44336;color:white;}
.home{background:#2196f3;color:white;}

.btn:hover{
transform:scale(1.05);
opacity:0.9;
}


.question{margin-bottom:15px;text-align:left}
.correct{color:green}
.wrong{color:red}

#timer{
font-size:20px;
color:#2196f3;
margin-bottom:15px;
font-weight:bold;
}


@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>


<div id="home" class="container">
    <div class="title">📘 QUIZ TIẾNG ANH LỚP 7 - HK1</div>
    <button class="btn start" onclick="startQuiz()">🚀 Bắt đầu làm bài</button>
    <button class="btn home" onclick="goHome()">⬅ Trang chủ</button>
</div>


<div id="quizPage" class="container" style="display:none;">
    <div class="title">📝 Bài kiểm tra</div>
    <div id="timer">⏱ 30:00</div>
    <div id="quiz"></div>
    <button class="btn submit" onclick="submitQuiz()">Nộp bài</button>
    <button class="btn cancel" onclick="cancelQuiz()">Hủy bài</button>
</div>


<div id="resultPage" class="container" style="display:none;">
    <div class="title">🎯 Kết quả</div>
    <div id="score"></div>
    <div id="answers"></div>
    <button class="btn home" onclick="goHome()">Trang chủ</button>
</div>

<script>


const bank = [
{q:"She ____ to school every day.",a:["go","goes","going","went"],correct:1},
{q:"I ____ a book now.",a:["read","reads","am reading","reading"],correct:2},
{q:"They ____ football yesterday.",a:["play","plays","played","playing"],correct:2},
{q:"He ____ English well.",a:["speak","speaks","spoke","speaking"],correct:1},
{q:"We ____ TV now.",a:["watch","watches","are watching","watched"],correct:2},
{q:"My hobby is ____ books.",a:["read","reading","reads","to read"],correct:1},
{q:"She likes ____ music.",a:["listen","listening","listens","to listening"],correct:1},
{q:"You should ____ water.",a:["drink","drinks","drank","drinking"],correct:0},
{q:"He has a ____.",a:["headache","book","car","pen"],correct:0},
{q:"I ____ homework yesterday.",a:["do","did","does","doing"],correct:1},
{q:"She ____ to school yesterday.",a:["go","goes","went","going"],correct:2},
{q:"We ____ a project.",a:["join","joins","joined","joining"],correct:2},
{q:"He ____ helping people.",a:["like","likes","liked","liking"],correct:1},
{q:"They ____ now.",a:["run","runs","are running","ran"],correct:2},
{q:"I ____ in Hanoi.",a:["live","lives","living","lived"],correct:0},
{q:"She ____ a teacher.",a:["is","are","am","be"],correct:0},
{q:"We ____ happy yesterday.",a:["are","is","was","were"],correct:3},
{q:"He ____ breakfast.",a:["have","has","had","having"],correct:1},
{q:"They ____ by bus.",a:["go","goes","went","going"],correct:0},
{q:"I ____ tired now.",a:["am","is","are","was"],correct:0},
];


let questions=[], timeLeft=1800, interval;


function startQuiz(){
document.getElementById("home").style.display="none";
document.getElementById("quizPage").style.display="block";

questions=[...bank].sort(()=>0.5-Math.random()).slice(0,20);
loadQuiz();

timeLeft=1800;
interval=setInterval(()=>{
timeLeft--;

let m=Math.floor(timeLeft/60);
let s=timeLeft%60;

document.getElementById("timer").innerText=
`⏱ ${m}:${s.toString().padStart(2,'0')}`;

if(timeLeft<=60){
document.getElementById("timer").style.color="red";
}

if(timeLeft<=0){
clearInterval(interval);
alert("⏰ Hết thời gian!");
submitQuiz();
}

},1000);
}


function loadQuiz(){
let html="";
questions.forEach((q,i)=>{
html+=`<div class="question"><p>${i+1}. ${q.q}</p>`;
q.a.forEach((c,j)=>{
html+=`<label><input type="radio" name="q${i}" value="${j}"> ${c}</label><br>`;
});
html+="</div>";
});
document.getElementById("quiz").innerHTML=html;
}


function submitQuiz(){
clearInterval(interval);
let score=0,html="";

questions.forEach((q,i)=>{
let ans=document.querySelector(`input[name="q${i}"]:checked`);
let user=ans?parseInt(ans.value):-1;

if(user===q.correct){
score++;
html+=`<p class="correct">Câu ${i+1}: Đúng</p>`;
}else{
html+=`<p class="wrong">Câu ${i+1}: Sai (Đáp án: ${q.a[q.correct]})</p>`;
}
});

document.getElementById("quizPage").style.display="none";
document.getElementById("resultPage").style.display="block";

document.getElementById("score").innerText=`Điểm: ${score}/20`;
document.getElementById("answers").innerHTML=html;
}


function cancelQuiz(){
clearInterval(interval);
window.location.href="index.html";
}


function goHome(){
window.location.href="index.html";
}

</script>

</body>
</html>
